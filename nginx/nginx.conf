server {
    listen 80:

    server_tokens off;

    # Hay que poner la API DEL BACKEND, para realizar el balanceo automatico de las 2 replicas
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header 148.83.102.25 $remote_addr;
    }

    # redirigir al frontend
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header 148.83.102.25 $remote_addr;
    }
}