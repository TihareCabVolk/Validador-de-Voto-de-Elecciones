# volumen para persistencia 
volumes:
  postgres:
    name: db_postegres

# redes aisladas para seguridad
networks:
  network_sist:
    driver: bridge
  db_network:
    driver: bridge

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: dockerfile
    ports:
      - 80:80
    networks:
      - network
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    networks:
      - network

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    deploy:
      replicas: 2
    environment:
      - DB_HOST=database
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    networks:
      - network
      - db_network

  DB:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network



